[databases]
php-core-server_db = host=db port=5432 dbname=php-core-server_db

; Optional: forward any unknown db to the real postgres (wildcard)
* = host=db port=5432

[pgbouncer]
listen_addr = *
listen_port = 6432
;auth_type = md5                  ; or scram-sha-256 if your Postgres passwords use it

auth_file = /etc/pgbouncer/userlist.txt

; Pool settings (hardcoded since ini is mounted)
pool_mode = session
max_client_conn = 10
default_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 5

server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits

; Logging – very helpful right now
; logfile = /dev/stdout
; log_connections = 1
; log_disconnections = 1
; verbose = 1                      ; increase for more debug output

; Admin console (connect with psql -d pgbouncer)
admin_users = postgres,${PGBOUNCER_USER}
stats_users = ${PGBOUNCER_USER}